<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7th Class PDFs</title>
<style>
  body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
  h1 { text-align: center; color: #333; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-top: 30px; }
  .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .card a { text-decoration: none; color: #0070f3; font-weight: bold; }
  .loading { text-align: center; color: #666; }
</style>
</head>
<body>
  <h1>📚 Class 1 to 7 PDFs</h1>
  <div class="grid" id="pdf-list">
    <p class="loading">Loading PDFs...</p>
  </div>

<script>
const USER = "codeworld74-Code";  // GitHub username
const REPO = "first-project";     // Repo name - 'firs' ko 'first' karo
const FOLDER = "Pdfs";            // Folder name - 'Pdfs' ko 'pdfs' karo, small letters

async function loadPDFs() {
  try {
    const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER}`);
    const files = await res.json();
    
    const list = document.getElementById('pdf-list');
    list.innerHTML = "";
    
    files
      .filter(f => f.name.endsWith('.pdf'))
      .forEach(f => {
        const className = f.name.replace('.pdf', '').replace(/_/g, ' ');
        list.innerHTML += `
          <div class="card">
            <a href="${f.download_url}" target="_blank">📄 ${f.name}</a>
            <p>${className}</p>
          </div>
        `;
      });
      
    if(list.innerHTML === "") {
      list.innerHTML = "<p>No PDFs found</p>";
    }
  } catch(e) {
    document.getElementById('pdf-list').innerHTML = "<p>Error loading PDFs</p>";
    console.log(e);
  }
}

loadPDFs();
</script>
</body>
</html>
